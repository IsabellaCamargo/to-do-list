<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>To Do List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>To Do List</h1>

<div class="input-area">
<input id="taskInput" placeholder="Digite uma tarefa">
<button id="addBtn">Adicionar</button>
</div>

<div class="filters">
<button data-filter="all">Todas</button>
<button data-filter="pending">Pendentes</button>
<button data-filter="completed">Concluídas</button>
</div>

<ul id="taskList"></ul>

<div class="info">
<span id="taskCount"></span>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
